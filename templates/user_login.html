<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        /* body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        } */

        form {
            background-color: #ffffff;
            padding: 25px 35px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            margin-top: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
        .add {
            background-color: #4CAF50;
        }
        .delete {
            background-color: #f11606;
        }
         button {
            background-color: #45a049;
        }
    </style>

</head>
<body>
    {% if messages %}
        {% for message in messages %}
           <p class="{% if message.tags == 'success' %}green {% else %} red {% endif %}">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <h2>Login</h2>
        <label>Username:</label><br><br>
        <input type="text" id="username" name="uname" required><br><br>
        <label>Password:</label><br><br>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
    </form>
    <button><a href="{% url 'user_registration' %}">Register</a></button>
</body>
</html>
