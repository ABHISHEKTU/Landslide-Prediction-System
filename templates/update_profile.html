{% include 'authority_header.html' %}
     <style>
        /* body {
            margin: 0;
            padding: 0;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;

        form {
            background-color: #ffffff;
            padding: 25px 35px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            margin-top: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <h2>Update Profile</h2>
        <label>Authority Name:</label><br><br>
        <input type="text" id="authority_name" value="{{ authority_profile.name }}" name="authority_name" ><br><br>
         <label>District:</label><br><br>
        <input type="text" id="district" value="{{ authority_profile.district }}" name="district" ><br><br>
        <label>Place:</label><br><br>
        <input type="text" id="place" value="{{ authority_profile.place }}" name="place" ><br><br>
        <label>Contact Number:</label><br><br>
        <input type="tel" id="phone" value="{{ authority_profile.phone }}" name="phone" ><br><br>
        <label>Email:</label><br><br>
        <input type="email" id="email" value="{{ authority_profile.email }}" name="email" ><br><br>
        <input type="submit" value="Update Profile">
    </form>
{% include 'authority_footer.html' %}
