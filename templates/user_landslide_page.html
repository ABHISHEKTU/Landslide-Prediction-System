


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landslide.AI | Professional Prediction System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --danger: #ff4f58;
            --success: #00ff88;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--bg-dark);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 10;
        }

        .brand h2 {
            margin: 0;
            background: linear-gradient(to right, var(--primary), #3a7bd5);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* FORM CONTROLS */
        .control-group {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin: 1.5rem 0;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        .coord-box {
            font-family: monospace;
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        button {
            cursor: pointer; border-radius: 8px; font-weight: 600;
            transition: 0.3s; border: none; padding: 12px; width: 100%;
        }

        .btn-predict { background: var(--primary); color: #000; margin-top: 10px; }
        .btn-predict:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }

        /* RESULT SECTION */
        .result-container { display: none; margin-top: 1rem; }

        .status-header {
            padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px;
            border-width: 1px; border-style: solid;
        }

        .status-header h2 { margin: 0; text-transform: uppercase; font-size: 1.2rem; }

        .prob-score { text-align: center; margin-bottom: 20px; font-size: 0.9rem; color: var(--text-dim); }
        .prob-score b { font-size: 1.5rem; color: var(--text-main); display: block; }

        .weather-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;
        }

        .weather-item {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 8px; border: 1px solid var(--border);
        }

        .weather-item b { font-size: 1rem; color: var(--text-main); display: block; margin-top: 4px; }

        .ai-box {
            background: rgba(0, 210, 255, 0.05); border-left: 3px solid var(--primary);
            padding: 15px; border-radius: 4px; line-height: 1.6; font-size: 0.9rem;
        }

        /* MAP */
        #map { width: 100%; height: 100%; background: #1e293b; }

        /* LOADER */
        #loader-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Sidebar Header Layout */
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        /* Home Button Styling */
        .btn-home {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            width: auto;
        }

        .btn-home:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
        }

        /* Report Button */
        #btnReport {
            display: none;
            margin-top: 12px;
            background: var(--danger);
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 79, 88, 0.4);
        }

        #btnReport:hover {
            filter: brightness(1.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 18px rgba(255, 79, 88, 0.35);
        }

        #btnReport:disabled {
            background: rgba(255, 79, 88, 0.3);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        #btnReport.pulse {
            animation: reportPulse 1.8s ease-in-out 3;
        }

        @keyframes reportPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 79, 88, 0); }
            50% { box-shadow: 0 0 0 8px rgba(255, 79, 88, 0.25); }
        }

        #btnReport.reported {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
            cursor: default;
        }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <h2>LANDSLIDE.AI</h2>
            </div>
            <a href="/user_home" class="btn-home">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Home
            </a>
        </div>

        <form id="predictForm">
            <div class="control-group">
                <span class="label">Target Coordinates</span>
                <div class="coord-box" id="disp-lat">Lat: --.----</div>
                <div class="coord-box" id="disp-lon">Lon: --.----</div>
                <input type="hidden" id="lat" name="latitude" required>
                <input type="hidden" id="lon" name="longitude" required>
            </div>

            <button type="button" style="background: rgba(255,255,255,0.1); color: white;"
                onclick="getLocation()">Use GPS Location</button>

            <button type="submit" class="btn-predict">RUN AI ANALYSIS</button>

            <!-- REPORT BUTTON: shown after analysis, saves via API on click -->
            <button type="button" id="btnReport" onclick="submitReport()">
                ⚠ REPORT TO AUTHORITY
            </button>
        </form>

        <div id="resultBox" class="result-container">
            <div id="statusHeader" class="status-header">
                <h2 id="ml">---</h2>
            </div>

            <div class="prob-score">
                AI Confidence Level
                <b id="prob">0%</b>
            </div>

            <span class="label">Current Environment</span>
            <div class="weather-grid">
                <div class="weather-item"><small>Temp</small><b id="temp">--</b></div>
                <div class="weather-item"><small>Rainfall</small><b id="rain">--</b></div>
                <div class="weather-item"><small>Humidity</small><b id="hum">--</b></div>
                <div class="weather-item"><small>Wind</small><b id="wind">--</b></div>
            </div>

            <span class="label">10-Day Historical Data</span>
            <div class="weather-grid">
                <div class="weather-item"><small>Total Rain</small><b id="totalRain">--</b></div>
                <div class="weather-item"><small>Avg Temp</small><b id="avgTemp">--</b></div>
            </div>

            <span class="label">AI Technical Assessment</span>
            <div class="ai-box" id="ai">---</div>
        </div>
    </aside>

    <main style="position: relative;">
        <div id="loader-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: 600;">Neural Network Processing...</p>
        </div>
        <div id="map"></div>
    </main>
</div>

<script>
    /* 1. INITIALIZE MAP */
    var map = L.map('map', { zoomControl: false }).setView([10.5, 76.5], 8);

    /* 2. ADD CONTROLS */
    var geocoder = L.Control.geocoder({
        defaultMarkGeocode: false,
        placeholder: "Search location...",
        collapsed: false,
        position: 'topright'
    })
    .on('markgeocode', function (e) {
        setMarker(e.geocode.center.lat, e.geocode.center.lng);
    })
    .addTo(map);

    L.control.zoom({ position: 'topright' }).addTo(map);

    /* 3. TILE LAYERS */
    var normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
    });

    L.control.layers({ "Default Map": normal, "Satellite View": satellite }).addTo(map);

    /* 4. MARKER & LOCATION LOGIC */
    var marker;
    function setMarker(lat, lon) {
        document.getElementById("lat").value = lat;
        document.getElementById("lon").value = lon;
        document.getElementById("disp-lat").innerText = "Lat: " + lat.toFixed(5);
        document.getElementById("disp-lon").innerText = "Lon: " + lon.toFixed(5);
        if (marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map);
        map.flyTo([lat, lon], 12);

        // Reset report button when user picks a new location
        resetReportButton();
    }

    map.on('click', e => setMarker(e.latlng.lat, e.latlng.lng));

    function getLocation() {
        navigator.geolocation.getCurrentPosition(
            p => setMarker(p.coords.latitude, p.coords.longitude),
            () => alert("Location access denied.")
        );
    }

    /* 5. RESET REPORT BUTTON HELPER */
    function resetReportButton() {
        const btn = document.getElementById("btnReport");
        btn.style.display = "none";
        btn.disabled = false;
        btn.classList.remove("reported", "pulse");
        btn.innerText = "⚠ REPORT TO AUTHORITY";
        btn.style.background = "var(--danger)";
        btn.style.color = "white";
        btn.style.border = "1px solid rgba(255, 79, 88, 0.4)";
    }

    /* 6. PREDICTION FETCH */
    document.getElementById("predictForm").onsubmit = function (e) {
        e.preventDefault();

        document.getElementById("loader-overlay").style.display = "flex";
        document.getElementById("resultBox").style.display = "none";
        resetReportButton();

        var fd = new FormData(this);

        fetch("/api/user_landslide-predict/", {
            method: "POST",
            headers: { "X-CSRFToken": "{{ csrf_token }}" },
            body: fd
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById("loader-overlay").style.display = "none";

            if (data.status === "error") {
                alert(data.message);
                return;
            }

            // Show result box
            document.getElementById("resultBox").style.display = "block";

            // Status heading
            const statusBox = document.getElementById("statusHeader");
            const mlTxt = document.getElementById("ml");
            mlTxt.innerText = data.prediction;

            const pValue = parseFloat(data.probability);
            const isDanger = pValue > 60;

            if (isDanger) {
                statusBox.style.background = "rgba(255, 79, 88, 0.15)";
                statusBox.style.color = "var(--danger)";
                statusBox.style.borderColor = "var(--danger)";
            } else {
                statusBox.style.background = "rgba(0, 255, 136, 0.15)";
                statusBox.style.color = "var(--success)";
                statusBox.style.borderColor = "var(--success)";
            }

            // Probability
            document.getElementById("prob").innerText = data.probability;

            // Current weather
            document.getElementById("temp").innerText = data.environment.current_weather.temp + " °C";
            document.getElementById("rain").innerText = data.environment.current_weather.rain + " mm";
            document.getElementById("hum").innerText = data.environment.current_weather.humidity + " %";
            document.getElementById("wind").innerText = data.environment.current_weather.wind + " m/s";

            // History
            document.getElementById("totalRain").innerText = data.environment.history.total_rain + " mm";
            document.getElementById("avgTemp").innerText = data.environment.history.avg_temp + " °C";

            // AI assessment
            document.getElementById("ai").innerText = data.ai_analysis;

            // Show report button — pulse if danger
            const btnReport = document.getElementById("btnReport");
            btnReport.style.display = "block";
            if (isDanger) {
                btnReport.classList.add("pulse");
            }
        })
        .catch(err => {
            document.getElementById("loader-overlay").style.display = "none";
            console.error(err);
            alert("Connection error: Ensure your backend is running.");
        });
    };

    /* 7. REPORT BUTTON — saves to DB via save_user_report endpoint */
    function submitReport() {
        const lat = document.getElementById("lat").value;
        const lon = document.getElementById("lon").value;

        if (!lat || !lon) {
            alert("Please select a location first.");
            return;
        }

        const btn = document.getElementById("btnReport");
        btn.disabled = true;
        btn.innerText = "Submitting...";

        const fd = new FormData();
        fd.append("latitude", lat);
        fd.append("longitude", lon);

        fetch("/api/save-user-report/", {
            method: "POST",
            headers: { "X-CSRFToken": "{{ csrf_token }}" },
            body: fd
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === "success") {
                btn.classList.remove("pulse");
                btn.classList.add("reported");
                btn.innerText = "✔ Report Submitted";
                // Stay disabled to prevent duplicate submissions
            } else {
                btn.disabled = false;
                btn.innerText = "⚠ REPORT TO AUTHORITY";
                alert("Failed to submit report: " + data.message);
            }
        })
        .catch(() => {
            btn.disabled = false;
            btn.innerText = "⚠ REPORT TO AUTHORITY";
            alert("Connection error while submitting report.");
        });
    }
</script>

</body>
</html>
