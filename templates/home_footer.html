    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/static/common/assets/js/bootstrap-5.0.0-beta2.min.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
        function initMap() {
        const defaultLocation = { lat: 9.9312, lng: 76.2673 }; // Kochi

        const map = new google.maps.Map(document.getElementById("dvMap"), {
            center: defaultLocation,
            zoom: 12,
        });

        const marker = new google.maps.Marker({
            position: defaultLocation,
            map: map,
            draggable: true
        });

        // Update lat/lng when marker is moved
        google.maps.event.addListener(marker, 'dragend', function (event) {
            document.getElementById("lati").value = event.latLng.lat();
            document.getElementById("longi").value = event.latLng.lng();
        });

        // Click on map to move marker
        map.addListener("click", function(event) {
            marker.setPosition(event.latLng);
            document.getElementById("lati").value = event.latLng.lat();
            document.getElementById("longi").value = event.latLng.lng();
        });
    }
    </script>
